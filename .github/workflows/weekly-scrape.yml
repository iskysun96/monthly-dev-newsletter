name: Weekly Scrape

on:
  schedule:
    - cron: "0 2 * * 0" # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      week_override:
        description: "ISO week to scrape (e.g. 2026-W11)"
        required: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly scrape
        env:
          GH_SCRAPE_TOKEN: ${{ secrets.GH_SCRAPE_TOKEN }}
          WEEK_OVERRIDE: ${{ github.event.inputs.week_override || '' }}
        run: python scripts/run_weekly_scrape.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: weekly scrape $(date -u +%Y-W%V)"
            git push
          fi
